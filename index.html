<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Judicial Case Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- Navigation Header -->
  <header>
    <div class="header-container">
      <h1>⚖️ Judicial Case Tracker</h1>
      <div class="user-info">
        <span id="user-display">Public View</span>
        <button id="login-btn" class="btn-secondary" onclick="openLoginModal()">Login</button>
        <button id="logout-btn" class="btn-secondary" onclick="logout()" style="display: none;">Logout</button>
      </div>
    </div>
  </header>

  <main class="container">

    <!-- Case Entry Section (Visible to Staff & Judge) -->
    <section id="admin-panel" class="card admin-section" style="display: none;">
      <h2>🧑‍⚖️ Case Management Panel</h2>
      <p class="subtitle">Enter a new case into the tracking database.</p>

      <form id="add-case-form" onsubmit="handleCreateCase(event)">
        
        <div class="form-grid">
          <div>
            <label>Case Number</label>
            <input type="text" id="case-num" placeholder="e.g. CR-2026-004" required />
          </div>
          <div>
            <label>Case Title</label>
            <input type="text" id="title" placeholder="e.g. State v. John Doe" required />
          </div>
          <div>
            <label>Status</label>
            <select id="status" required>
              <option value="Pending">Pending</option>
              <option value="In Trial">In Trial</option>
              <option value="Dismissed">Dismissed</option>
              <option value="Closed">Closed</option>
            </select>
          </div>
          <div>
            <label>Next Hearing Date</label>
            <input type="date" id="hearing-date" required />
          </div>
        </div>

        <!-- Case Details / Notes Field -->
        <div class="full-width-field">
          <label>Case Details / Summary</label>
          <textarea id="details" rows="3" placeholder="Enter summary of allegations, evidence, or notes..."></textarea>
        </div>

        <button type="submit" class="btn-primary">Add Case</button>
      </form>
    </section>

    <!-- Public / Case List Section -->
    <section class="card">
      <div class="section-header">
        <h2>📋 Registered Court Cases</h2>
        <button class="btn-secondary" onclick="fetchCases()">Refresh</button>
      </div>

      <!-- NEW SEARCH & FILTER BAR -->
      <div class="search-bar-container">
        <input type="text" id="search-input" placeholder="🔍 Search by Case #, Title, or Details..." oninput="filterCases()">
        <select id="filter-status" onchange="filterCases()">
          <option value="ALL">All Statuses</option>
          <option value="Pending">Pending</option>
          <option value="In Trial">In Trial</option>
          <option value="Dismissed">Dismissed</option>
          <option value="Closed">Closed</option>
        </select>
      </div>

      <!-- Case List Table / Mobile Responsive Cards -->
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Case #</th>
              <th>Title</th>
              <th>Status</th>
              <th>Days on Desk</th>
              <th>Next Hearing</th>
              <th>Details</th>
              <th id="actions-header" style="display: none;">Actions</th>
            </tr>
          </thead>
          <tbody id="cases-body">
            <tr>
              <td colspan="7" style="text-align: center;">Loading cases...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- Login Modal -->
  <div id="login-modal" class="modal" style="display: none;">
    <div class="modal-content card">
      <h3>System Authentication</h3>
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email / Identifier</label>
          <input type="email" id="email" required placeholder="user@court.gov">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required>
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn-primary">Sign In</button>
          <button type="button" class="btn-secondary" onclick="closeLoginModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
